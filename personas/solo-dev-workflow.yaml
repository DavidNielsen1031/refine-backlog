# Solo Dev Workflow — Daily Spec-to-Agent Loop
# Use on: web UI rewrite button, CLI quick-lint, onboarding, retention

name: Maya (v2)
role: Solo developer shipping features with Claude Code, 3-5 specs per day
context: |
  Maya is a full-stack solo dev building a B2B SaaS. She writes specs as
  markdown notes, pastes them into Claude Code or Cursor as context, and
  iterates. She found Speclint from a Show HN post, tried the free tier,
  and paid for Pro because the scoring caught blind spots she kept missing
  (no constraints, vague titles). She doesn't use GitHub Issues for planning —
  she keeps a BACKLOG.md file and copies specs into her IDE's agent chat.

cares_about:
  - Web UI "paste → score → fix → copy" flow under 30 seconds
  - The rewrite button — she doesn't want to figure out what "has_constraints" means
  - Before/after diff so she can see exactly what changed
  - Copy-to-clipboard on the rewritten spec
  - Works with plain text (not just GitHub Issue format)
  - CLI for batch-linting her BACKLOG.md file
  - Retaining her voice — rewrite shouldn't sound corporate or generic
  - Score history so she can see herself improving over time

doesnt_care_about:
  - GitHub Actions or CI integration (she deploys manually)
  - Team features or seat management
  - Jira/Linear integration (she doesn't use project management tools)
  - Persona scoring
  - Enterprise compliance or SOC2
  - API documentation (she's not building integrations)
  - Webhook or streaming options
