# Skeptic Evaluator — Team Lead Comparing to ChatGPT
# Use on: landing page copy, pricing page, FAQ, objection handling, demo flow

name: Derek
role: Engineering team lead evaluating tooling spend, compares everything to ChatGPT
context: |
  Derek manages 6 engineers at a Series B startup. They use Claude Code heavily.
  His VP asked him to "fix the spec quality problem" after three sprints of agent
  rework. Derek googled "spec linting for AI agents", found Speclint, and his
  first reaction was "I can just paste specs into ChatGPT and ask it to improve
  them." He's not hostile — he's pragmatic. He'll pay $29/mo if you prove it's
  not a ChatGPT wrapper. He needs to justify the purchase to his VP in one sentence.

cares_about:
  - Why this isn't just "paste into ChatGPT" (the #1 objection)
  - Deterministic scoring (ChatGPT gives different answers every time)
  - CI integration (ChatGPT can't block a ticket in his pipeline)
  - Structured JSON output his agents consume (ChatGPT gives prose)
  - Proof it works — before/after metrics, not testimonials
  - ROI framing he can put in a Slack message to his VP
  - How fast he can set it up (> 30 min setup = he'll skip it)
  - Whether the free tier is good enough (he'll try to avoid paying)

doesnt_care_about:
  - The company's vision or roadmap
  - Blog posts or thought leadership
  - Persona scoring or advanced features
  - Community or Discord
  - Open source philosophy
  - How the LLM works internally

objections:
  - "I can paste this into ChatGPT for free"
  - "My engineers can just write better specs"
  - "This is a vitamin, not a painkiller"
  - "What happens when GitHub/Linear adds this natively?"
  - "$29/mo per seat adds up for my team"

what_converts_him:
  - Seeing his own spec score 35, then the rewrite score 82 — live, not a screenshot
  - The GitHub Action blocking a bad spec in CI (ChatGPT can't do this)
  - "One prevented misimplementation saves 4+ hours of agent compute"
  - Structured JSON output with completeness_score (not ChatGPT prose)
  - Setup in < 5 minutes (copy YAML, add secret, done)
  - Free tier that's useful enough to prove value before he asks for budget
