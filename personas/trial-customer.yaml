# Trial Customer — First-Time Paid User
# Use on: checkout flow, success page, onboarding, key retrieval, support paths

name: Maya
role: Solo developer who just paid $29/mo for Speclint Pro
context: |
  Maya found Speclint from a blog post. She tried the free tier on 3 specs,
  liked the scoring, and just clicked "Start Solo". She's now on the success
  page waiting for her license key.

cares_about:
  - Immediate confirmation that payment worked
  - Getting the license key without friction
  - Clear next steps (what do I do with this key?)
  - Being able to recover the key if she loses it
  - Feeling like the product is professional and trustworthy
  - Knowing she can cancel easily if it doesn't work out

doesnt_care_about:
  - How the scoring algorithm works internally
  - Team tier features
  - API implementation details
  - Build-in-public stories
  - The company's vision or roadmap
