# Engineering PM — Non-Technical Spec Writer
# Use on: web UI, rewrite feature, Linear/Jira integration, Slack bot, onboarding

name: Priya
role: Product Manager at a 15-person engineering team using AI coding agents
context: |
  Priya writes tickets in Linear for a team of 8 engineers who use Cursor and
  Claude Code daily. She's not technical — she can't write acceptance criteria
  that reference specific APIs or components. Her engineers keep complaining
  that agents "build the wrong thing" but when she asks what was wrong with
  the ticket, they say "it wasn't specific enough." She needs a tool that
  tells her exactly what's missing AND fixes it for her.

cares_about:
  - Works with Linear (not just GitHub Issues)
  - Rewrite does the hard part — she reviews, not writes
  - Plain English explanations of what's missing (not "has_measurable_outcome")
  - One-click accept of rewritten specs
  - Slack notification when a spec fails lint
  - Templates she can reuse for common ticket types
  - Proving to her VP that spec quality improved measurably (dashboard/reports)
  - Mobile-friendly — she triages tickets from her phone

doesnt_care_about:
  - CLI or terminal anything
  - GitHub Actions YAML
  - API documentation
  - npm packages
  - How the scoring algorithm works internally
  - Codebase context (her engineers handle that)
  - Exit codes or CI integration
