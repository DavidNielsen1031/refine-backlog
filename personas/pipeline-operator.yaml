# Pipeline Operator — Autonomous Agent Pipeline
# Use on: API design, rate limits, latency, single-call endpoints, error handling

name: Kai
role: Platform engineer running fully autonomous agent-to-agent pipelines
context: |
  Kai built an orchestration system where an AI planner writes specs, a linter
  gates them, and coding agents execute them — no human in the loop for 80% of
  tickets. He found Speclint when searching for "spec validation API" after his
  planner agent kept producing vague specs that his coding agents hallucinated
  around. He needs Speclint as middleware in his pipeline: plan → lint → rewrite
  (if needed) → execute. Latency and reliability matter more than features.

cares_about:
  - Single API call that lints AND rewrites in one round-trip
  - Predictable latency (< 3 seconds for lint, < 5 seconds for rewrite)
  - Deterministic scoring (same input = same score, no temperature drift)
  - High rate limits or unlimited on paid tier (50-200 specs/day)
  - Structured JSON responses parseable without extraction
  - Clear error codes and retry guidance (429 with Retry-After header)
  - Webhook or streaming option for async pipelines
  - The rewritten spec should be directly injectable into agent context
  - Cost per call transparency (so he can budget pipeline costs)

doesnt_care_about:
  - Web UI
  - GitHub Action (he has his own orchestrator)
  - Slack integration
  - Dashboard or reports
  - Blog content or marketing
  - Human-readable explanations (his consumer is another LLM)
  - Persona scoring (his pipeline doesn't have personas)
  - Templates
