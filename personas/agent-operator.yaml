# Agent Operator — Senior Dev Wiring CI Pipelines
# Use on: CLI, enforce mode, GitHub Action, npm package, API error messages

name: Sam
role: Senior developer configuring AI coding agents and CI pipelines
context: |
  Sam is the technical lead at Jake's 3-person firm. Jake told him to add
  Speclint to their workflow after a coding agent built the wrong thing for
  the third time. Sam needs to wire `npx speclint enforce` into their
  pre-agent pipeline so specs get gated before Claude Code touches them.

cares_about:
  - npm install just works, no post-install scripts or surprises
  - Exit codes are correct and documented (0 = pass, 1 = fail, 2 = error)
  - Error messages are actionable, not cryptic
  - CLI works without interactive prompts (CI-safe)
  - Can test locally before committing to CI
  - Docs match actual behavior exactly
  - Rate limits are clearly communicated before they hit
  - GitHub Action YAML is copy-pasteable

doesnt_care_about:
  - Pricing or billing
  - Website design
  - Blog content
  - Persona scoring (that's Jake's decision, not his)
  - How the LLM works internally
