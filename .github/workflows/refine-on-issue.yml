name: Refine on Issue Open

on:
  issues:
    types: [opened]
  workflow_dispatch:
    inputs:
      issue_number:
        description: 'Issue number to refine'
        required: true
        type: number

jobs:
  refine:
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - uses: actions/checkout@v4

      - name: Get issue title (workflow_dispatch)
        if: github.event_name == 'workflow_dispatch'
        id: get_issue
        run: |
          TITLE=$(gh issue view ${{ inputs.issue_number }} --repo ${{ github.repository }} --json title -q .title)
          echo "title=$TITLE" >> $GITHUB_OUTPUT
          echo "number=${{ inputs.issue_number }}" >> $GITHUB_OUTPUT
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Refine issue
        uses: DavidNielsen1031/refine-backlog-action@v1
        with:
          items: ${{ github.event_name == 'workflow_dispatch' && steps.get_issue.outputs.title || github.event.issue.title }}
          issue-number: ${{ github.event_name == 'workflow_dispatch' && steps.get_issue.outputs.number || github.event.issue.number }}
          write-back: "true"
          gherkin: "true"
          user-stories: "true"
          key: ${{ secrets.REFINE_BACKLOG_KEY }}
