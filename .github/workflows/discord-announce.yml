name: Discord Announce on Merge

on:
  push:
    branches: [main]

jobs:
  announce:
    runs-on: ubuntu-latest
    steps:
      - name: Post to Discord #ops-logs
        env:
          DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
        run: |
          COMMIT_MSG=$(echo '${{ github.event.head_commit.message }}' | head -1 | cut -c1-80)
          AUTHOR='${{ github.event.head_commit.author.name }}'
          COMMIT_URL='${{ github.event.head_commit.url }}'
          SHORT_SHA='${{ github.sha }}'
          SHORT_SHA="${SHORT_SHA:0:7}"
          REPO='${{ github.repository }}'

          MESSAGE="🚀 **Merged to main** — \`refine-backlog\`
\`${SHORT_SHA}\` ${COMMIT_MSG}
Author: ${AUTHOR}
<${COMMIT_URL}>"

          curl -s -X POST "https://discord.com/api/v10/channels/1474028145190637598/messages" \
            -H "Authorization: Bot ${DISCORD_BOT_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "{\"content\": $(echo "$MESSAGE" | python3 -c 'import json,sys; print(json.dumps(sys.stdin.read()))')}"
