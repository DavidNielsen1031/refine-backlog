name: Discord Announce on Merge

on:
  push:
    branches: [main]

jobs:
  announce:
    # Runs on Mac Mini self-hosted runner — avoids Cloudflare 1010 block
    # that hits all shared GitHub Actions IPs when calling Discord API.
    runs-on: [self-hosted, macOS, ARM64]
    steps:
      - name: Post to Discord ops-logs
        env:
          DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
          COMMIT_MSG: ${{ github.event.head_commit.message }}
          COMMIT_AUTHOR: ${{ github.event.head_commit.author.name }}
          COMMIT_URL: ${{ github.event.head_commit.url }}
          COMMIT_SHA: ${{ github.sha }}
        run: |
          python3 - <<'PYEOF'
          import os, json
          from urllib.request import urlopen, Request
          from urllib.error import HTTPError

          token  = os.environ.get("DISCORD_BOT_TOKEN", "")
          msg    = os.environ.get("COMMIT_MSG", "").split("\n")[0][:80]
          author = os.environ.get("COMMIT_AUTHOR", "unknown")
          url    = os.environ.get("COMMIT_URL", "")
          sha    = os.environ.get("COMMIT_SHA", "")[:7]

          content = f"\U0001f680 **Merged to main** \u2014 `speclint`\n`{sha}` {msg}\nAuthor: {author}\n<{url}>"
          payload = json.dumps({"content": content}).encode()

          req = Request(
              "https://discord.com/api/v10/channels/1474028145190637598/messages",
              data=payload,
              headers={
                  "Authorization": f"Bot {token}",
                  "Content-Type": "application/json",
                  "User-Agent": "DiscordBot (https://github.com/DavidNielsen1031, 1.0)",
              },
          )
          try:
              urlopen(req, timeout=10)
              print("Posted to Discord #ops-logs")
          except HTTPError as e:
              print(f"HTTP {e.code}: {e.read().decode()}")
              raise SystemExit(1)
          PYEOF
