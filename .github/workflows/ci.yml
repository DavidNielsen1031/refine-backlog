name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test & Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Security audit
        run: npm audit --audit-level=moderate

      - name: Repo hygiene check
        run: |
          STALE_PATTERNS=(
            "REFINEMENT_LOG.md"
            "REFINEMENT_1B_LOG.md"
            "TESTING.md"
            "VERIFICATION_RESULTS.md"
            "test-api-mock.js"
            ".axon/"
          )
          FAIL=0
          for pattern in "${STALE_PATTERNS[@]}"; do
            if [ -e "$pattern" ]; then
              echo "❌ BLOCKED: Stale artifact found: $pattern"
              FAIL=1
            fi
          done
          while IFS= read -r file; do
            size=$(wc -c < "$file")
            if [ "$size" -gt 10485760 ]; then
              echo "❌ BLOCKED: Large file in repo: $file ($(( size / 1048576 ))MB)"
              FAIL=1
            fi
          done < <(git ls-files --cached)
          [ "$FAIL" -eq 0 ] && echo "✅ Repo hygiene OK"
          exit $FAIL

      - name: Run tests
        run: npm test
        env:
          ANTHROPIC_API_KEY: test-key
          STRIPE_SECRET_KEY: sk_test_mock
          STRIPE_PRO_PRICE_ID: price_test_pro
          STRIPE_TEAM_PRICE_ID: price_test_team

      - name: Build
        run: npm run build
        env:
          ANTHROPIC_API_KEY: test-key
          STRIPE_SECRET_KEY: sk_test_mock
          STRIPE_PRO_PRICE_ID: price_test_pro
          STRIPE_TEAM_PRICE_ID: price_test_team
          KV_REST_API_URL: https://mock.upstash.io
          KV_REST_API_TOKEN: mock-token
